<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — License Server</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root { --dark: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; }
    body { background: var(--dark); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,.5); }
    .login-title { font-size: 1.5rem; font-weight: 700; color: #58a6ff; text-align: center; margin-bottom: .25rem; }
    .login-sub { text-align: center; color: #8b949e; margin-bottom: 2rem; font-size: .9rem; }
    .form-control { background: #0d1117; border: 1px solid var(--border); color: var(--text); }
    .form-control:focus { background: #0d1117; color: var(--text); border-color: #1f6feb; box-shadow: 0 0 0 .2rem rgba(31,111,235,.25); }
    .form-label { color: #8b949e; font-size: .85rem; margin-bottom: .25rem; }
    .btn-login { background: #238636; border: none; width: 100%; padding: .7rem; font-weight: 600; letter-spacing: .5px; }
    .btn-login:hover { background: #2ea043; }
    .dev-credit { text-align: center; color: #8b949e; font-size: .75rem; margin-top: 1.5rem; }
    .shield-icon { font-size: 3rem; color: #58a6ff; display: block; text-align: center; margin-bottom: 1rem; }
    .alert-danger { background: rgba(248,81,73,.1); border-color: #f85149; color: #f85149; }
  </style>
</head>
<body>
  <div class="login-card">
    <i class="bi bi-shield-lock shield-icon"></i>
    <div class="login-title">License Server</div>
    <div class="login-sub">Admin Dashboard — Muhammad Saim</div>

    {% if error %}
    <div class="alert alert-danger text-center py-2 mb-3" role="alert">
      <i class="bi bi-exclamation-triangle me-1"></i>{{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/admin/login">
      <div class="mb-3">
        <label class="form-label"><i class="bi bi-person me-1"></i>Username</label>
        <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label"><i class="bi bi-lock me-1"></i>Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-success btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <div class="dev-credit">
      <i class="bi bi-code-slash me-1"></i>Developed by <strong>Muhammad Saim</strong> — Software Engineer
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
