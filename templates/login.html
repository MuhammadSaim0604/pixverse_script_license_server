<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — License Server</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .float-icon { animation: float 4s ease-in-out infinite; }
        .login-card { background: rgba(22, 27, 34, 0.95); backdrop-filter: blur(12px); }
        input:focus { outline: none; }
    </style>
</head>
<body class="bg-[#0d1117] flex items-center justify-center min-h-screen p-4" style="background-image: radial-gradient(ellipse at 50% 0%, #1a2332 0%, #0d1117 70%);">

<div class="login-card border border-[#30363d] rounded-2xl p-8 sm:p-10 w-full max-w-md shadow-2xl">
    <!-- Icon -->
    <div class="float-icon text-center mb-4">
        <i class="bi bi-shield-lock text-5xl text-[#58a6ff]"></i>
    </div>

    <!-- Title -->
    <h1 class="text-2xl font-bold text-[#58a6ff] text-center">License Server</h1>
    <p class="text-[#8b949e] text-center text-sm mt-1 mb-6">Admin Dashboard — Muhammad Saim</p>

    <!-- Error -->
    {% if error %}
    <div class="bg-[#3a1a1a] border border-[#f85149] text-[#f85149] rounded-lg px-4 py-2.5 text-sm flex items-center gap-2 mb-5">
        <i class="bi bi-exclamation-triangle"></i>
        <span>{{ error }}</span>
    </div>
    {% endif %}

    <!-- Form -->
    <form method="POST" action="/admin/login" class="space-y-4">
        <div>
            <label class="block text-[#8b949e] text-sm font-medium mb-1.5">
                <i class="bi bi-person mr-1"></i>Username
            </label>
            <input type="text" name="username" value="admin" 
                   class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg px-4 py-2.5 text-[#c9d1d9] placeholder-[#484f58] focus:border-[#1f6feb] focus:ring-2 focus:ring-[#1f6feb]/25 transition-all"
                   placeholder="Enter username" required autofocus>
        </div>

        <div>
            <label class="block text-[#8b949e] text-sm font-medium mb-1.5">
                <i class="bi bi-lock mr-1"></i>Password
            </label>
            <input type="password" name="password" 
                   class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg px-4 py-2.5 text-[#c9d1d9] placeholder-[#484f58] focus:border-[#1f6feb] focus:ring-2 focus:ring-[#1f6feb]/25 transition-all"
                   placeholder="Enter password" required>
        </div>

        <button type="submit" class="w-full bg-[#238636] hover:bg-[#2ea043] text-white font-semibold py-2.5 rounded-lg transition-all flex items-center justify-center gap-2">
            <i class="bi bi-box-arrow-in-right"></i>
            Sign In
        </button>
    </form>

    <p class="text-center text-[#8b949e] text-xs mt-6">
        <i class="bi bi-code-slash mr-1"></i>
        Developed by <strong class="text-[#c9d1d9]">Muhammad Saim</strong> — Software Engineer
    </p>
</div>

</body>
</html>
